<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #6366f1; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #a855f7; stop-opacity: 1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  {/* Outer Orbital Ring */}
  <circle cx="50" cy="50" r="48" fill="none" stroke="#6366f1" stroke-width="2" stroke-opacity="0.3" />
  
  {/* Inner Orbital Ring */}
  <circle cx="50" cy="50" r="40" fill="none" stroke="#a855f7" stroke-width="2" stroke-opacity="0.4" />

  {/* Abstract Cosmic Heart / Union */}
  <path
    d="M50 85 C20 65, 10 45, 10 30 A20 20 0 0 1 50 30 A20 20 0 0 1 90 30 C90 45, 80 65, 50 85"
    fill="none"
    stroke="url(#logoGradient)"
    stroke-width="6"
    stroke-linecap="round"
    style="filter: url(#glow)"
  />

  {/* Central Star */}
  <path
    d="M50 25 L54 42 L70 42 L58 52 L62 70 L50 60 L38 70 L42 52 L30 42 L46 42 Z"
    fill="url(#logoGradient)"
  />

  {/* Sparkles */}
  <circle cx="25" cy="25" r="2" fill="#fbbf24" opacity="0.8" />
  <circle cx="75" cy="75" r="2" fill="#fbbf24" opacity="0.8" />
  <circle cx="85" cy="35" r="1.5" fill="#f59e0b" opacity="0.8" />
</svg>
