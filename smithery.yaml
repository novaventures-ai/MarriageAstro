# Smithery MCP Server Listing
# Submit at: https://smithery.ai/new

name: vedic-astro-mcp
displayName: "Vedic Astrology — MarriageAstro (22 Tools)"
description: |
  The world's most complete Vedic astrology MCP server. 22 tools covering:
  birth charts, Ashtakoot compatibility, Mangal/Nadi/Kaal Sarpa dosha, divorce risk,
  infidelity analysis, sexual compatibility, mental health markers, psychological profile,
  conflict zones, vulnerability windows, spouse prediction, Jaimini/Chara dasha,
  KP stellar astrology, navamsa matching, synastry, marriage timing, and remedies.

  Built on Swiss Ephemeris (Lahiri ayanamsa) for maximum accuracy.
  No other Vedic API provides divorce risk + infidelity + sexual compatibility + mental health.

  Free tier available — try any tool with a free key and get real chart-based previews
  before upgrading.

version: "1.0.0"
license: MIT
homepage: https://marriageastro.com
repository: https://github.com/novaventures-ai/marriageastro

categories:
  - astrology
  - data
  - productivity

tags:
  - vedic-astrology
  - kundali
  - birth-chart
  - compatibility
  - ashtakoot
  - marriage
  - jyotish
  - navamsa
  - dasha
  - horoscope
  - india
  - divorce-risk
  - spouse-prediction
  - mental-health
  - relationship

install:
  npm: vedic-astro-mcp

runtime:
  command: npx
  args:
    - vedic-astro-mcp
  env:
    VEDIC_ASTRO_API_KEY:
      description: "Your MarriageAstro API key — get free at marriageastro.com/api-keys"
      required: true

tools:
  - name: get_birth_chart
    tier: free
    description: Generate a Vedic birth chart — planets, houses, nakshatras, ascendant, yogas, and Vimshottari dashas

  - name: calculate_compatibility
    tier: free
    description: 36-point Ashtakoot Milan compatibility score with all 8 Koot parameters

  - name: analyze_dosha
    tier: free
    description: Mangal dosha, Nadi dosha, Kaal Sarpa yoga, and all major doshas with severity ratings

  - name: get_full_compatibility_report
    tier: developer
    description: Complete compatibility report — synastry, navamsa, divisional charts, dasha timing

  - name: get_marriage_timing
    tier: developer
    description: Auspicious marriage windows from Vimshottari dasha + transit analysis

  - name: get_synastry
    tier: developer
    description: Cross-chart planetary aspects, house overlays, and sexual chemistry aspects

  - name: get_navamsa_matching
    tier: developer
    description: D9 Navamsa chart deep compatibility — the marriage-specific divisional chart

  - name: get_kp_analysis
    tier: developer
    description: Krishnamurti Paddhati stellar astrology with 249 sub-lords

  - name: get_jaimini_dasha
    tier: developer
    description: Jaimini Chara Dasha, Darakaraka analysis, and Upapada Lagna

  - name: get_self_analysis
    tier: developer
    description: Single person marriage readiness, personality profile, timing forecast, and spouse profile

  - name: get_divorce_risk
    tier: premium
    description: "UNIQUE: Divorce probability scoring from 7th/2nd house afflictions — no other API has this"

  - name: get_infidelity_risk
    tier: premium
    description: "UNIQUE: 5th/8th/12th house infidelity pattern detection + protective factor analysis"

  - name: get_sexual_compatibility
    tier: premium
    description: Venus/Mars synastry, Yoni match, sexual temperament, and mutual satisfaction analysis

  - name: get_sexual_health
    tier: premium
    description: Individual PME/ED/Frigidity risk indicators and libido analysis from birth chart

  - name: get_mental_health_analysis
    tier: premium
    description: "UNIQUE: Anxiety, depression, and narcissism markers from planetary positions"

  - name: get_psychological_profile
    tier: premium
    description: Attachment style, emotional patterns, and relationship personality type

  - name: get_conflict_zones
    tier: premium
    description: "UNIQUE: Conflict triggers and hot-button topics — what the couple will fight about"

  - name: get_vulnerability_windows
    tier: premium
    description: "UNIQUE: Time periods when the relationship is at highest breakdown risk"

  - name: get_inlaw_analysis
    tier: premium
    description: Compatibility with partner's family from 4th/8th house indicators

  - name: get_spouse_prediction
    tier: premium
    description: Future spouse appearance, nature, profession, and when/how you will meet them

  - name: get_modern_challenges
    tier: premium
    description: Digital age relationship patterns — social media, long-distance, Uranus/Neptune/Pluto influence

  - name: get_remedies
    tier: premium
    description: Lal Kitab and gemstone recommendations based on planetary afflictions
