# Smithery MCP Server Listing
# Submit at: https://smithery.ai/new
# Docs: https://smithery.ai/docs/config

name: marriage-astro-mcp
displayName: Vedic Astrology MCP — MarriageAstro
description: |
  The world's most complete Vedic astrology MCP server. 22 tools covering:
  birth charts, Ashtakoot compatibility, Mangal/Nadi/Kaal Sarpa dosha, divorce risk,
  infidelity analysis, sexual compatibility, mental health markers, psychological profile,
  conflict zones, vulnerability windows, spouse prediction, Jaimini/Chara dasha,
  KP stellar astrology, navamsa matching, synastry, marriage timing, and remedies.

  Built on Swiss Ephemeris (Lahiri ayanamsa) for maximum accuracy.
  No other Vedic API provides divorce risk + infidelity + sexual compatibility + mental health.

version: "1.0.0"
license: MIT
homepage: https://marriage-astro.vercel.app
repository: https://github.com/novaventures-ai/marriageastro

categories:
  - astrology
  - data
  - productivity

tags:
  - vedic-astrology
  - kundali
  - birth-chart
  - compatibility
  - ashtakoot
  - marriage
  - jyotish
  - navamsa
  - dasha
  - horoscope
  - india
  - divorce-risk
  - spouse-prediction

# How to install
install:
  npm: marriage-astro-mcp

# Runtime configuration
runtime:
  command: npx
  args:
    - marriage-astro-mcp
  env:
    MARRIAGE_ASTRO_API_KEY:
      description: Your MarriageAstro API key (get free at marriageastro.com/api-keys)
      required: true

# Tools exposed (22 total)
tools:
  - name: get_birth_chart
    tier: free
    description: Generate a Vedic birth chart with planets, houses, nakshatras, ascendant, yogas, and dashas

  - name: calculate_compatibility
    tier: free
    description: 36-point Ashtakoot Milan score with all 8 parameters

  - name: analyze_dosha
    tier: free
    description: Mangal, Nadi, Kaal Sarpa, and other yoga/dosha patterns

  - name: get_full_compatibility_report
    tier: developer
    description: Complete compatibility report with all sections

  - name: get_marriage_timing
    tier: developer
    description: Auspicious marriage windows from dasha + transit analysis

  - name: get_synastry
    tier: developer
    description: Cross-chart planetary aspects and house overlays

  - name: get_navamsa_matching
    tier: developer
