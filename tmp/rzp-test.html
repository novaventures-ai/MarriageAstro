<!DOCTYPE html>
<html>
<head>
    <title>Razorpay Test</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <button id="pay-btn">Pay Now</button>
    <div id="log"></div>
    <script>
        const btn = document.getElementById('pay-btn');
        const log = document.getElementById('log');
        
        btn.onclick = function() {
            try {
                const rzp = new Razorpay({
                    key: "rzp_live_SaUVktEmTZ1XKz",
                    amount: 4900,
                    currency: "INR",
                    name: "Astro Marriage",
                    description: "Unlock: test",
                    order_id: "order_SaaLneWhV76eTe",
                    handler: function(response) {
                        log.innerHTML += "Success: " + JSON.stringify(response) + "<br>";
                    }
                });
                
                rzp.on('payment.failed', function(response) {
                    log.innerHTML += "Fail EVENT: " + JSON.stringify(response.error) + "<br>";
                });
                
                rzp.open();
                log.innerHTML += "Modal opened successfully.<br>";
            } catch(e) {
                log.innerHTML += "CATCH ERROR: " + e.message + "<br>";
            }
        };
    </script>
</body>
</html>
