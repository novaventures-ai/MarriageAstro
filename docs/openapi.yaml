      description: "**Tier: Solo/Premium** — Divorce probability scoring from 7th/2nd house afflictions. UNIQUE — no other Vedic API provides this. Lower tiers receive a real teaser preview (HTTP 200, preview:true) not a 403."
      tags: [Premium]
