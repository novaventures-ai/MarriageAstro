openapi: "3.0.3"
info:
  title: MarriageAstro Vedic Astrology API
  version: "1.0.0"
  description: |
    The world's most complete Vedic astrology calculation API.

    22 endpoints covering: birth charts, 36-point compatibility, Ashtakoot Milan,
    dosha analysis, synastry, navamsa, KP astrology, Jaimini dasha, marriage timing,
    divorce risk, infidelity risk, sexual compatibility, mental health markers,
    psychological profiles, conflict zones, vulnerability windows, spouse prediction,
    modern challenges, and remedies.

    Built on Swiss Ephemeris with Lahiri ayanamsa for maximum accuracy.

    ## Tiers
    - **Free** (50 calls/day): birth-chart, compatibility, dosha-check + teaser previews of all 22 endpoints
    - **Developer** ($9/mo, 500 calls/day): full-report, marriage-timing, synastry, navamsa, kp-analysis, jaimini-dasha, self-analysis
    - **Solo** ($49/mo, 5000 calls/day): All 22 endpoints — for individual developers and MCP users
    - **Premium** ($99/mo, unlimited): All 22 endpoints — for businesses and high-volume production use

    **Try before you upgrade**: Premium endpoints return HTTP 200 with `"preview": true` on lower tiers,
    showing real chart-based insights (risk level, key indicators) before asking for upgrade.

    Get your API key at: https://marriage-astro.vercel.app/api-keys
  contact:
    url: https://marriage-astro.vercel.app
    email: api@marriage-astro.vercel.app
  license:
    name: Commercial
    url: https://marriage-astro.vercel.app/legal/terms

servers:
  - url: https://marriage-astro.vercel.app/api/v1
    description: Production

components:
  schemas:
    BirthInput:
      type: object
      required: [date, latitude, longitude]
      properties:
        name:
          type: string
          example: "Rahul Sharma"
        gender:
          type: string
          enum: [male, female, other]
          default: male
        date:
          type: string
          format: date
          example: "1990-01-15"
        time:
          type: string
          example: "10:30"
          description: "HH:MM 24h format (defaults to 12:00)"
        latitude:
          type: number
          example: 19.076
        longitude:
          type: number
          example: 72.8777
        timezone:
          type: string
          example: "Asia/Kolkata"
        location:
          type: string
          example: "Mumbai, India"

    PairInput:
      type: object
      required: [person_a_date, person_a_latitude, person_a_longitude, person_b_date, person_b_latitude, person_b_longitude]
      properties:
        person_a_name:  { type: string }
        person_a_gender: { type: string, enum: [male, female, other] }
        person_a_date:  { type: string, format: date, example: "1990-01-15" }
        person_a_time:  { type: string, example: "10:30" }
        person_a_latitude:  { type: number, example: 19.076 }
        person_a_longitude: { type: number, example: 72.8777 }
        person_a_timezone:  { type: string, example: "Asia/Kolkata" }
        person_a_location:  { type: string }
        person_b_name:  { type: string }
        person_b_gender: { type: string, enum: [male, female, other] }
        person_b_date:  { type: string, format: date, example: "1992-05-20" }
        person_b_time:  { type: string, example: "08:00" }
        person_b_latitude:  { type: number, example: 28.6139 }
        person_b_longitude: { type: number, example: 77.209 }
        person_b_timezone:  { type: string, example: "Asia/Kolkata" }
        person_b_location:  { type: string }

    ApiSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        preview:
          type: boolean
          description: "Present and true when response is a teaser preview (lower tier)"
          example: false
        tier_required:
          type: string
          description: "The minimum tier required for full results (only present in preview responses)"
          example: "premium"
        data:
          type: object

    ApiError:
      type: object
      properties:
        error:
          type: string
        upgrade_url:
          type: string

paths:
  /birth-chart:
    post:
      summary: Generate Birth Chart
      description: "**Tier: Free** — Planets, houses, nakshatras, ascendant, yogas, and Vimshottari dashas for one person. Response includes `_premium_preview` hints showing divorce risk level, mental health flags, and remedy count."
      tags: [Free]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BirthInput' }
            example:
              name: "Rahul Sharma"
              date: "1990-01-15"
              time: "10:30"
              latitude: 19.076
              longitude: 72.8777
              timezone: "Asia/Kolkata"
              gender: male
      responses:
        "200":
          description: Birth chart data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        "400": { description: Missing required fields }
        "401": { description: Invalid API key }
        "429": { description: Daily limit reached }

  /compatibility:
    post:
      summary: Ashtakoot Milan Score
      description: "**Tier: Free** — 36-point compatibility with all 8 parameters: Varna, Vashya, Tara, Yoni, Graha Maitri, Gana, Bhakoot, Nadi. Includes dosha flags and `_premium_preview` hints."
      tags: [Free]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PairInput' }
      responses:
        "200": { description: Compatibility score and breakdown, content: { application/json: { schema: { $ref: '#/components/schemas/ApiSuccess' } } } }
        "400": { description: Missing required fields }
        "401": { description: Invalid API key }

  /dosha-check:
    post:
      summary: Dosha Analysis
      description: "**Tier: Free** — Mangal dosha, Nadi dosha, Kaal Sarpa, Guru Chandal, and other yogas/doshas with severity. Supports single person or pair."
      tags: [Free]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PairInput' }
      responses:
        "200": { description: Dosha analysis result }
        "401": { description: Invalid API key }

  /full-report:
    post:
      summary: Full Compatibility Report
      description: "**Tier: Developer** — Complete compatibility report including synastry, navamsa, divisional charts, yogas, dasha timing, and more."
      tags: [Developer]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PairInput' }
      responses:
        "200": { description: Full CompatibilityReport object }
        "403": { description: "Tier too low — upgrade required", content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } } }

  /marriage-timing:
    post:
      summary: Marriage Timing Windows
      description: "**Tier: Developer** — Auspicious marriage windows from Vimshottari Dasha analysis."
      tags: [Developer]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BirthInput' }
      responses:
        "200": { description: Marriage timing windows }
        "403": { description: Tier too low }

  /synastry:
